<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRC Quiz — GRC Day 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Prompt:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --purple-900: #1a0a3c;
    --purple-800: #2d1470;
    --purple-700: #4a1fa8;
    --purple-600: #6b2fd4;
    --purple-500: #8b3ff5;
    --purple-400: #a96cf8;
    --purple-300: #c89dfa;
    --purple-200: #e4c8fd;
    --purple-100: #f5edff;
    --gold: #c8a44a;
    --gold-light: #e8c97a;
    --gold-pale: #faf3e0;
    --white: #ffffff;
    --correct: #1a9e6e;
    --wrong: #d44a2a;

    /* Fluid scale — clamp(min, preferred, max) */
    --fs-xs:   clamp(11px, 1.2vw, 14px);
    --fs-sm:   clamp(13px, 1.4vw, 16px);
    --fs-base: clamp(15px, 1.6vw, 18px);
    --fs-md:   clamp(17px, 1.9vw, 22px);
    --fs-lg:   clamp(20px, 2.4vw, 28px);
    --fs-xl:   clamp(26px, 3.2vw, 40px);
    --fs-2xl:  clamp(36px, 4.5vw, 56px);

    --pad-card: clamp(1.5rem, 3vw, 3rem);
    --pad-card-x: clamp(1.25rem, 3.5vw, 3.5rem);
    --gap-choice: clamp(8px, 1vw, 14px);
    --radius-card: clamp(16px, 2vw, 28px);
    --radius-btn:  clamp(12px, 1.5vw, 18px);
  }

  html { font-size: 16px; }

  html, body {
    width: 100%; min-height: 100%;
    overflow-x: hidden;
    background: var(--purple-900);
  }

  body {
    font-family: 'Sarabun', sans-serif;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(107,47,212,0.35) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 100%, rgba(139,63,245,0.2) 0%, transparent 55%),
      linear-gradient(160deg, #1a0a3c 0%, #0e0520 60%, #1a0a3c 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(1rem, 3vh, 2.5rem) clamp(0.75rem, 3vw, 2rem);
  }

  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: clamp(300px, 40vw, 600px);
    height: clamp(300px, 40vw, 600px);
    top: -20%; right: -10%;
    background: radial-gradient(circle, rgba(139,63,245,0.15) 0%, transparent 70%);
  }
  body::after {
    width: clamp(250px, 35vw, 500px);
    height: clamp(250px, 35vw, 500px);
    bottom: -15%; left: -8%;
    background: radial-gradient(circle, rgba(200,164,74,0.1) 0%, transparent 70%);
  }

  /* ── LAYOUT CONTAINER ── */
  #app {
    position: relative;
    z-index: 1;
    width: 100%;
    /* On iPad/Notebook: comfortable reading width, never too narrow or too wide */
    max-width: min(860px, 92vw);
  }

  .screen { display: none; }
  .screen.active { display: block; }

  /* ── CARD ── */
  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(200,164,74,0.25);
    border-radius: var(--radius-card);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: var(--pad-card) var(--pad-card-x);
    box-shadow:
      0 0 0 1px rgba(139,63,245,0.15),
      0 24px 64px rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(255,255,255,0.08);
  }

  /* ── START SCREEN ── */
  .start-logo-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: clamp(1rem, 2.5vh, 2rem);
  }
  .start-logo {
    width:  clamp(120px, 14vw, 200px);
    height: clamp(120px, 14vw, 200px);
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--gold);
    box-shadow: 0 0 0 6px rgba(200,164,74,0.15), 0 16px 48px rgba(0,0,0,0.5);
  }

  .event-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(200,164,74,0.15);
    border: 1px solid rgba(200,164,74,0.4);
    border-radius: 999px;
    padding: 5px clamp(12px, 1.5vw, 20px);
    font-size: var(--fs-xs);
    font-weight: 600;
    color: var(--gold-light);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: clamp(0.75rem, 1.5vh, 1.5rem);
  }
  .event-tag::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold);
    animation: pulse 1.8s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.7); }
  }

  .start-title {
    font-family: 'Prompt', sans-serif;
    font-size: var(--fs-xl);
    font-weight: 800;
    color: var(--white);
    line-height: 1.1;
    margin-bottom: 0.4em;
  }
  .start-title span {
    background: linear-gradient(90deg, var(--gold-light), var(--purple-300));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .start-desc {
    font-size: var(--fs-base);
    color: rgba(255,255,255,0.55);
    margin-bottom: clamp(1.25rem, 3vh, 2.5rem);
    line-height: 1.7;
  }

  .stats-row {
    display: flex;
    gap: clamp(8px, 1.2vw, 16px);
    margin-bottom: clamp(1.25rem, 3vh, 2.5rem);
  }
  .stat-chip {
    flex: 1;
    background: rgba(139,63,245,0.15);
    border: 1px solid rgba(139,63,245,0.3);
    border-radius: clamp(10px, 1.2vw, 16px);
    padding: clamp(12px, 1.5vh, 20px) 10px;
    text-align: center;
  }
  .stat-num {
    font-family: 'Prompt', sans-serif;
    font-size: var(--fs-lg);
    font-weight: 700;
    color: var(--purple-300);
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-label {
    font-size: var(--fs-xs);
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.02em;
  }

  .start-btn {
    width: 100%;
    padding: clamp(14px, 1.8vh, 22px) 24px;
    background: linear-gradient(135deg, var(--purple-600) 0%, var(--purple-500) 100%);
    border: none;
    border-radius: var(--radius-btn);
    color: white;
    font-family: 'Prompt', sans-serif;
    font-size: var(--fs-md);
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 8px 32px rgba(107,47,212,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(107,47,212,0.55); }
  .start-btn:active { transform: translateY(0); }
  .start-btn svg { width: clamp(18px, 2vw, 24px); height: clamp(18px, 2vw, 24px); }

  /* ── QUIZ SCREEN ── */
  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: clamp(1rem, 2vh, 1.75rem);
  }
  .quiz-logo-small {
    width:  clamp(36px, 4.5vw, 56px);
    height: clamp(36px, 4.5vw, 56px);
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(200,164,74,0.5);
  }
  .q-indicator { display: flex; align-items: center; gap: clamp(5px, 0.6vw, 8px); }
  .q-dot {
    width: clamp(9px, 1vw, 13px);
    height: clamp(9px, 1vw, 13px);
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    transition: all 0.3s;
  }
  .q-dot.active {
    background: var(--purple-400);
    box-shadow: 0 0 8px rgba(169,108,248,0.7);
    width: clamp(24px, 2.5vw, 34px);
    border-radius: 5px;
  }
  .q-dot.done { background: var(--gold); }

  .progress-wrap {
    background: rgba(255,255,255,0.07);
    border-radius: 999px;
    height: clamp(4px, 0.5vh, 7px);
    margin-bottom: clamp(1rem, 2vh, 1.75rem);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--purple-400), var(--gold-light));
    border-radius: 999px;
    transition: width 0.4s cubic-bezier(.4,0,.2,1);
  }

  .q-num-label {
    font-size: var(--fs-xs);
    font-weight: 600;
    color: var(--purple-300);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.4em;
  }
  .q-text {
    font-family: 'Prompt', sans-serif;
    font-size: var(--fs-md);
    font-weight: 600;
    color: var(--white);
    line-height: 1.45;
    margin-bottom: clamp(1rem, 2.5vh, 2rem);
    min-height: 2.8em;
  }

  .choices { display: flex; flex-direction: column; gap: var(--gap-choice); }

  .choice-btn {
    background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: clamp(11px, 1.3vw, 16px);
    padding: clamp(12px, 1.5vh, 18px) clamp(14px, 1.6vw, 20px);
    font-family: 'Sarabun', sans-serif;
    font-size: var(--fs-base);
    color: rgba(255,255,255,0.85);
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    gap: clamp(10px, 1.2vw, 16px);
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .choice-btn:hover:not(:disabled) {
    background: rgba(139,63,245,0.2);
    border-color: rgba(139,63,245,0.5);
    color: white;
  }
  .choice-btn .badge {
    width:  clamp(28px, 3.2vw, 42px);
    height: clamp(28px, 3.2vw, 42px);
    border-radius: clamp(6px, 0.8vw, 10px);
    background: rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Prompt', sans-serif;
    font-size: var(--fs-sm);
    font-weight: 600;
    color: rgba(255,255,255,0.6);
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .choice-btn .choice-text { flex: 1; line-height: 1.5; }

  .choice-btn.correct { background: rgba(26,158,110,0.15); border-color: var(--correct); color: #b0f0d8; }
  .choice-btn.correct .badge { background: var(--correct); color: white; }
  .choice-btn.wrong { background: rgba(212,74,42,0.15); border-color: var(--wrong); color: #f5c4b5; }
  .choice-btn.wrong .badge { background: var(--wrong); color: white; }
  .choice-btn:disabled { cursor: default; }

  .feedback-box {
    margin-top: clamp(0.75rem, 1.2vh, 1.25rem);
    padding: clamp(10px, 1.3vh, 16px) clamp(14px, 1.6vw, 20px);
    border-radius: clamp(10px, 1.2vw, 14px);
    font-size: var(--fs-sm);
    font-weight: 500;
    display: none;
    align-items: center;
    gap: 8px;
  }
  .feedback-box.show { display: flex; }
  .feedback-box.correct { background: rgba(26,158,110,0.15); color: #6fddba; border: 1px solid rgba(26,158,110,0.3); }
  .feedback-box.wrong   { background: rgba(212,74,42,0.15);  color: #f5c4b5; border: 1px solid rgba(212,74,42,0.3); }

  .next-btn {
    margin-top: clamp(1rem, 1.8vh, 1.5rem);
    width: 100%;
    padding: clamp(13px, 1.6vh, 18px) 24px;
    background: linear-gradient(135deg, var(--purple-600), var(--purple-500));
    border: none;
    border-radius: var(--radius-btn);
    color: white;
    font-family: 'Prompt', sans-serif;
    font-size: var(--fs-base);
    font-weight: 600;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 6px 24px rgba(107,47,212,0.4);
  }
  .next-btn.show { display: flex; }
  .next-btn:hover { transform: translateY(-1px); box-shadow: 0 10px 32px rgba(107,47,212,0.5); }
  .next-btn:active { transform: translateY(0); }

  /* ── RESULT SCREEN ── */
  .result-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(12px, 1.5vw, 20px);
    margin-bottom: clamp(1rem, 2vh, 1.75rem);
  }
  .result-logo {
    width:  clamp(52px, 6vw, 80px);
    height: clamp(52px, 6vw, 80px);
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--gold);
    box-shadow: 0 0 0 4px rgba(200,164,74,0.2);
  }

  .score-ring-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: clamp(1rem, 2vh, 1.75rem);
  }
  .score-ring {
    width:  clamp(130px, 16vw, 190px);
    height: clamp(130px, 16vw, 190px);
    border-radius: 50%;
    background: rgba(139,63,245,0.1);
    border: 4px solid var(--purple-500);
    box-shadow: 0 0 0 8px rgba(107,47,212,0.1), inset 0 0 32px rgba(139,63,245,0.15);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .score-ring::before {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 2px solid rgba(200,164,74,0.2);
  }
  .score-num {
    font-family: 'Prompt', sans-serif;
    font-size: var(--fs-2xl);
    font-weight: 800;
    color: white;
    line-height: 1;
  }
  .score-denom {
    font-size: var(--fs-sm);
    color: var(--purple-300);
    margin-top: 4px;
  }

  .result-title {
    font-family: 'Prompt', sans-serif;
    font-size: var(--fs-lg);
    font-weight: 700;
    color: white;
    text-align: center;
    margin-bottom: 0.4rem;
  }
  .result-desc {
    font-size: var(--fs-sm);
    color: rgba(255,255,255,0.5);
    text-align: center;
    margin-bottom: clamp(1rem, 2vh, 1.75rem);
    line-height: 1.6;
  }

  .breakdown-card {
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: clamp(12px, 1.5vw, 18px);
    overflow: hidden;
    margin-bottom: clamp(1rem, 2vh, 1.75rem);
  }
  .breakdown-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: clamp(10px, 1.2vh, 16px) clamp(14px, 1.6vw, 20px);
    font-size: var(--fs-sm);
    color: rgba(255,255,255,0.6);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    gap: 12px;
  }
  .breakdown-row:last-child { border-bottom: none; background: rgba(107,47,212,0.1); }
  .breakdown-row .q-label { display: flex; align-items: center; gap: 8px; }
  .breakdown-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .breakdown-status { font-weight: 600; font-size: var(--fs-xs); }
  .breakdown-status.ok { color: #6fddba; }
  .breakdown-status.ng { color: #f5a495; }
  .breakdown-total { color: white; font-weight: 700; font-size: var(--fs-base); font-family: 'Prompt', sans-serif; }

  .restart-btn {
    width: 100%;
    padding: clamp(14px, 1.8vh, 20px) 24px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--purple-500) 100%);
    border: none;
    border-radius: var(--radius-btn);
    color: white;
    font-family: 'Prompt', sans-serif;
    font-size: var(--fs-md);
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 8px 32px rgba(107,47,212,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .restart-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(107,47,212,0.5); }
  .restart-btn:active { transform: translateY(0); }

  /* ── ANIMATION ── */
  .screen.active { animation: fadeSlide 0.35s ease; }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── BREAKPOINT OVERRIDES ──
     These are safety nets; fluid clamp() handles most cases already. */

  /* Large desktop / external monitor (≥1400px) */
  @media (min-width: 1400px) {
    #app { max-width: 900px; }
  }

  /* Notebook landscape ~1024–1399px: no override needed, clamp handles it */

  /* iPad landscape 1024px */
  @media (max-width: 1024px) {
    #app { max-width: min(780px, 90vw); }
  }

  /* iPad portrait ~768px */
  @media (max-width: 820px) {
    #app { max-width: 96vw; }
    .card { padding: clamp(1.25rem, 4vw, 2rem) clamp(1.25rem, 4.5vw, 2.5rem); }
  }

  /* Phone landscape / small tablet ≤600px */
  @media (max-width: 600px) {
    #app { max-width: 100%; }
    .card { border-radius: 18px; }
    body { padding: 0.75rem; }
  }

  /* Phone portrait ≤420px */
  @media (max-width: 420px) {
    .card { border-radius: 14px; padding: 1.25rem 1rem; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- START -->
  <div id="screen-start" class="screen active card">
    <div style="text-align:center">
      <div class="start-logo-wrap">
        <img class="start-logo" id="logo-start" src="" alt="GRC Logo">
      </div>
      <div class="event-tag">GRC Day 2026</div>
      <div class="start-title">GRC <span>Knowledge</span><br>Quiz</div>
      <p class="start-desc">ทดสอบความรู้ด้าน<br>Governance · Risk · Compliance</p>
    </div>
    <div class="stats-row">
      <div class="stat-chip">
        <div class="stat-num">5</div>
        <div class="stat-label">คำถาม</div>
      </div>
      <div class="stat-chip">
        <div class="stat-num">30</div>
        <div class="stat-label">ข้อทั้งหมด</div>
      </div>
      <div class="stat-chip">
        <div class="stat-num">4</div>
        <div class="stat-label">ตัวเลือก</div>
      </div>
    </div>
    <button class="start-btn" onclick="startQuiz()">
      <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 4l10 6-10 6V4z" fill="white"/>
      </svg>
      เริ่มทำแบบทดสอบ
    </button>
  </div>

  <!-- QUIZ -->
  <div id="screen-quiz" class="screen card">
    <div class="quiz-header">
      <img class="quiz-logo-small" id="logo-quiz" src="" alt="GRC">
      <div class="q-indicator" id="q-dots"></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="q-num-label" id="q-num-label">ข้อที่ 1 จาก 5</div>
    <div class="q-text" id="q-text"></div>
    <div class="choices" id="choices"></div>
    <div class="feedback-box" id="feedback-box"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">
      ถัดไป
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M7 4l5 5-5 5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>

  <!-- RESULT -->
  <div id="screen-result" class="screen card">
    <div class="result-header">
      <img class="result-logo" id="logo-result" src="" alt="GRC">
      <div>
        <div style="font-family:'Prompt',sans-serif;font-size:14px;font-weight:600;color:var(--gold-light);letter-spacing:0.08em;text-transform:uppercase;">GRC Day 2026</div>
        <div style="font-size:13px;color:rgba(255,255,255,0.4);">ผลการทดสอบ</div>
      </div>
    </div>
    <div class="score-ring-wrap">
      <div class="score-ring">
        <div class="score-num" id="result-score">0</div>
        <div class="score-denom">จาก 5</div>
      </div>
    </div>
    <div class="result-title" id="result-title"></div>
    <div class="result-desc" id="result-desc"></div>
    <div class="breakdown-card" id="result-breakdown"></div>
    <button class="restart-btn" onclick="startQuiz()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 9A6 6 0 0 1 14.7 5.3M3 9l-2-2m2 2 2-2M15 9a6 6 0 0 1-11.7 3.7M15 9l2 2m-2-2-2 2" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      เล่นใหม่อีกครั้ง
    </button>
  </div>

const LABELS = ['ก','ข','ค','ง'];
let sessionQ=[], curIdx=0, score=0, answered=false, answers=[];

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

function buildDots(){
  const c=document.getElementById('q-dots');
  c.innerHTML='';
  for(let i=0;i<5;i++){
    const d=document.createElement('div');
    d.className='q-dot'+(i===curIdx?' active':i<curIdx?' done':'');
    c.appendChild(d);
  }
}

function startQuiz(){
  sessionQ=shuffle(allQ).slice(0,5);
  curIdx=0;score=0;answers=[];
  show('screen-quiz');
  renderQ();
}

function renderQ(){
  answered=false;
  const q=sessionQ[curIdx];
  buildDots();
  document.getElementById('progress-fill').style.width=((curIdx/5)*100)+'%';
  document.getElementById('q-num-label').textContent='ข้อที่ '+(curIdx+1)+' จาก 5';
  document.getElementById('q-text').textContent=q.q;

  const fb=document.getElementById('feedback-box');
  fb.className='feedback-box';fb.innerHTML='';

  const nb=document.getElementById('next-btn');
  nb.className='next-btn';
  nb.innerHTML=(curIdx<4?'ถัดไป <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M7 4l5 5-5 5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>':'ดูผลคะแนน <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 3.5A5.5 5.5 0 1 1 9 14.5A5.5 5.5 0 0 1 9 3.5z" stroke="white" stroke-width="1.8"/><path d="M9 7v3l1.5 1.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/></svg>');

  const con=document.getElementById('choices');
  con.innerHTML='';
  q.c.forEach((c,i)=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.innerHTML=`<span class="badge">${LABELS[i]}</span><span class="choice-text">${c}</span>`;
    btn.onclick=()=>pick(i);
    con.appendChild(btn);
  });
}

function pick(idx){
  if(answered)return;
  answered=true;
  const q=sessionQ[curIdx];
  const btns=document.querySelectorAll('.choice-btn');
  btns.forEach(b=>b.disabled=true);
  const ok=idx===q.a;
  btns[idx].classList.add(ok?'correct':'wrong');
  if(!ok)btns[q.a].classList.add('correct');
  if(ok)score++;

  const fb=document.getElementById('feedback-box');
  if(ok){
    fb.className='feedback-box correct show';
    fb.innerHTML='✓ ถูกต้อง! ยอดเยี่ยมมาก';
  } else {
    fb.className='feedback-box wrong show';
    fb.innerHTML='✗ ไม่ถูกต้อง — คำตอบที่ถูกคือ ตัวเลือก '+LABELS[q.a];
  }
  answers.push({correct:ok});
  document.getElementById('next-btn').className='next-btn show';
}

function nextQuestion(){
  curIdx++;
  if(curIdx<5){renderQ();}
  else{showResult();}
}

function showResult(){
  document.getElementById('progress-fill').style.width='100%';
  document.getElementById('result-score').textContent=score;
  show('screen-result');

  const pct=(score/5)*100;
  let t,d;
  if(pct===100){t='ยอดเยี่ยมที่สุด!';d='คุณตอบถูกทุกข้อ เชี่ยวชาญ GRC อย่างแท้จริง 🏆';}
  else if(pct>=80){t='ดีมาก!';d='ความรู้ GRC ของคุณอยู่ในระดับดีเยี่ยม';}
  else if(pct>=60){t='ผ่านการทดสอบ!';d='มีพื้นฐาน GRC ที่ดี ลองทบทวนเพิ่มเติมได้';}
  else if(pct>=40){t='พอใช้';d='ยังมีโอกาสพัฒนาความรู้ GRC อีกมาก';}
  else{t='ต้องศึกษาเพิ่ม';d='ลองทำแบบทดสอบใหม่หลังทบทวนเนื้อหา';}

  document.getElementById('result-title').textContent=t;
  document.getElementById('result-desc').textContent=d;

  const bd=document.getElementById('result-breakdown');
  bd.innerHTML=answers.map((a,i)=>`
    <div class="breakdown-row">
      <span class="q-label">
        <span class="breakdown-dot" style="background:${a.correct?'#1a9e6e':'#d44a2a'}"></span>
        ข้อที่ ${i+1}
      </span>
      <span class="breakdown-status ${a.correct?'ok':'ng'}">${a.correct?'ถูกต้อง':'ผิด'}</span>
    </div>
  `).join('')+`
    <div class="breakdown-row">
      <span class="q-label" style="color:rgba(255,255,255,0.8);font-weight:600">คะแนนรวม</span>
      <span class="breakdown-total">${score} / 5</span>
    </div>
  `;
}
</script>
